<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>55Five BOT</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
      text-align: center;
    }
    .box {
      margin-top: 50px;
      padding: 20px;
    }
    .card {
      background: #1c1c2b;
      padding: 20px;
      border-radius: 10px;
      margin: 10px;
    }
    .big { color: orange; }
    .small { color: cyan; }
    .next { color: lime; font-size: 24px; }
  </style>
</head>

<body>
  <div class="box">
    <h1>🔥 55Five BOT ANALYZER</h1>

    <div class="card" id="data">Loading...</div>
    <div class="card" id="prediksi"></div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch("https://api.55fiveapi.com/api/webapi/GetNoaverageEmerdList");
        const json = await res.json();

        const list = json?.data?.list || [];

        if (!list.length) {
          document.getElementById("data").innerHTML = "Data kosong";
          return;
        }

        const last = list[0].number;
        const besarKecil = last >= 5 ? "BESAR" : "KECIL";

        // pola sederhana
        const next = besarKecil === "BESAR" ? "KECIL" : "BESAR";

        document.getElementById("data").innerHTML = `
          <h2>Angka terakhir: ${last}</h2>
          <h3 class="${besarKecil === "BESAR" ? "big" : "small"}">
            ${besarKecil}
          </h3>
        `;

        document.getElementById("prediksi").innerHTML = `
          <h2 class="next">Prediksi selanjutnya: ${next}</h2>
        `;

      } catch (e) {
        document.getElementById("data").innerHTML = "❌ Gagal ambil data";
      }
    }

    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
